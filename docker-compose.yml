version: '3.8'

services:
  # Broker MQTT (Requisito 4)
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mqtt_broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: always

  # Base de datos de series temporales (Requisito 6 - Sugerencia)
  influxdb:
    image: influxdb:latest
    container_name: influxdb_db
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=proyecto_plantas
      - DOCKER_INFLUXDB_INIT_BUCKET=sensores
    volumes:
      - ./influxdb/data:/var/lib/influxdb2
    restart: always

  # Dashboard de monitorización (Requisito 7 - Sugerencia)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana_dashboard
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/data:/var/lib/grafana
    depends_on:
      - influxdb
    restart: always
